<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Revision Quiz</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        #quiz-box { 
            background: white; padding: 30px; width: 100%; max-width: 450px; 
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            box-sizing: border-box; text-align: center;
        }

        /* Naya: Topic Header space cover karne ke liye */
        .topic-info { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .topic-info h2 { font-size: 1.1rem; color: #444; margin: 0; }
        
        .stats-top { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #555; }
        
        .progress-container { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #007bff; transition: width 0.4s; }
        
        .question-card { text-align: left; margin-bottom: 25px; min-height: 250px; } /* Min-height se box bada rahega */
        .btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #e0e0e0; border-radius: 15px; background: white; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .btn:hover { border-color: #007bff; background: #f8fbff; }
        
        .correct { background: #2ecc71 !important; color: white; border-color: #2ecc71; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
        
        #google-link { display: none; margin-top: 15px; padding: 14px; background: #4285f4; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; width: 100%; box-sizing: border-box; }
        
        /* Naya: Footer space bharne ke liye */
        .stats-footer { display: flex; justify-content: space-between; padding-top: 20px; border-top: 2px solid #f0f2f5; color: #7f8c8d; font-size: 0.9rem; }
        .motivational-quote { margin-top: 20px; font-style: italic; color: #999; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="quiz-box">
    <div class="topic-info">
        <h2>📜 Aaj ka Topic: Modern Indian History</h2>
    </div>
    
    <div class="stats-top">
        <div id="points">Points: 0</div>
        <div id="total-timer">Time: 0s</div>
    </div>
    
    <div class="progress-container"><div id="progress-bar"></div></div>

    <div class="question-card">
        <h3 id="question">Loading questions...</h3>
        <div id="options"></div>
        <div id="feedback" style="margin-top:15px; font-weight:bold;"></div>
        <a id="google-link" href="#" target="_blank">🔍 Google par samjhein</a>
    </div>

    <div class="stats-footer">
        <div>Progress: <span id="progress-text">0/0</span></div>
        <div>Accuracy: <span id="accuracy">100%</span></div>
    </div>
    
    <div class="motivational-quote">"Har din ka thoda-thoda gyaan, safalta ka raasta hai."</div>
</div>

<script>
    let quizData = [], currentQ = 0, points = 0, seconds = 0, totalAttempted = 0, timerInterval;

    timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('total-timer').innerText = `Time: ${seconds}s`;
    }, 1000);

    fetch('data.json')
        .then(res => res.json())
        .then(data => { quizData = data; loadQuestion(); });

    function loadQuestion() {
        if (currentQ >= quizData.length) {
            clearInterval(timerInterval);
            document.getElementById('quiz-box').innerHTML = `
                <h2 style="color:#007bff">Quiz Complete! 🎉</h2>
                <p>Final Points: ${points}</p>
                <p>Time Taken: ${seconds}s</p>
                <button class="btn" onclick="location.reload()">Dobara Shuru Karein</button>
            `;
            return;
        }
        
        const qData = quizData[currentQ];
        document.getElementById('question').innerText = `${currentQ + 1}. ${qData.q}`;
        document.getElementById('options').innerHTML = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('google-link').style.display = 'none';
        
        let progress = ((currentQ) / quizData.length) * 100;
        document.getElementById('progress-bar').style.width = progress + "%";
        document.getElementById('progress-text').innerText = `${currentQ}/${quizData.length}`;
        
        qData.o.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt === qData.a, qData.link);
            document.getElementById('options').appendChild(btn);
        });
    }

    function checkAnswer(btn, isCorrect, link) {
        totalAttempted++;
        document.querySelectorAll('.btn').forEach(b => b.disabled = true);
        
        if (isCorrect) {
            btn.classList.add('correct');
            points++;
            document.getElementById('points').innerText = `Points: ${points}`;
            document.getElementById('feedback').innerText = "✅ Sahi Jawab!";
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerText = "❌ Galat Jawab!";
            const gLink = document.getElementById('google-link');
            gLink.href = link;
            gLink.style.display = 'inline-block';
        }
        
        let acc = Math.round((points / totalAttempted) * 100);
        document.getElementById('accuracy').innerText = acc + "%";
        
        setTimeout(() => { currentQ++; loadQuestion(); }, 3000);
    }
</script>
</body>
</html>
