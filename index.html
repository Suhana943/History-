<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Quiz Cards</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        .correct { background: #2ecc71 !important; color: white; }
        .wrong { background: #e74c3c !important; color: white; }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // Sirf file names
    const files = ["data.json", "quiz.json", "quiz2.json"];

    async function loadQuizzes() {
        for (let file of files) {
            let response = await fetch(file);
            let data = await response.json();
            
            // Format check (kuch data mein 'quiz' key hai, kuch direct array)
            let questions = data.quiz ? data.quiz : data;
            
            // Har file ke liye card banayein
            let card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>File: ${file}</h3>`;
            
            // Filhal har card mein pehla sawal dikha raha hai
            let qData = questions[0];
            let q = qData.q || qData.question;
            let o = qData.o || qData.options;
            let a = qData.a || qData.answer;

            card.innerHTML += `<p>${q}</p>`;
            o.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === a) btn.className = 'btn correct';
                    else btn.className = 'btn wrong';
                };
                card.appendChild(btn);
            });
            document.getElementById('app').appendChild(card);
        }
    }

    loadQuizzes();
</script>
</body>
</html>
