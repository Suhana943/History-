<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>History Quiz</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .quiz-card { background: white; padding: 25px; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 12px; background: white; cursor: pointer; text-align: left; }
        .correct { background: #2ecc71 !important; color: white; border-color: #2ecc71; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
        #next-btn { display: none; background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div id="quiz-container"></div>

<script>
    const files = ["data.json", "quiz.json", "quiz2.json"];

    async function init() {
        const container = document.getElementById('quiz-container');

        for (let file of files) {
            let res = await fetch(file);
            let data = await res.json();
            let items = data.quiz ? data.quiz : data;
            
            let qIndex = 0;
            let card = document.createElement('div');
            card.className = 'quiz-card';
            container.appendChild(card);

            function showQ() {
                let item = items[qIndex];
                let q = item.q || item.question;
                let o = item.o || item.options;
                let a = item.a || item.answer;

                card.innerHTML = `<h3>${file} (Sawal ${qIndex + 1}/${items.length})</h3><p><strong>${q}</strong></p>`;
                
                o.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        document.querySelectorAll('.btn').forEach(b => b.disabled = true);
                        if(opt === a) btn.classList.add('correct');
                        else btn.classList.add('wrong');
                        document.getElementById('next-btn').style.display = 'block';
                    };
                    card.appendChild(btn);
                });

                let next = document.createElement('button');
                next.id = "next-btn";
                next.innerText = "Next Sawal ➡️";
                next.onclick = () => {
                    qIndex++;
                    if(qIndex < items.length) showQ();
                    else card.innerHTML = `<h3>${file} khatam! 🎉</h3>`;
                };
                card.appendChild(next);
            }
            showQ();
        }
    }
    init();
</script>
</body>
</html>
