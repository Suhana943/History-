<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz App</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; }
        .dark-mode { --primary: #818cf8; --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; transition: 0.3s; }
        
        .navbar { background: var(--card-bg); padding: 15px; display: flex; gap: 10px; overflow-x: auto; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e2e8f0; }
        .nav-btn { background: #e2e8f0; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: white; }
        
        .container { max-width: 550px; margin: 30px auto; padding: 0 20px; }
        #progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        
        .quiz-card { background: var(--card-bg); padding: 35px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .btn { display: block; width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #e2e8f0; border-radius: 14px; background: transparent; color: var(--text); cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.2s; }
        .btn:disabled { opacity: 0.8; cursor: not-allowed; }
        
        .controls { display: flex; gap: 12px; margin-top: 25px; }
        .nav-control { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: #e2e8f0; }
        .google-btn { display: block; width: 100%; padding: 14px; margin-top: 15px; text-align: center; text-decoration: none; border: 2px solid var(--primary); color: var(--primary); border-radius: 12px; font-weight: bold; }
        
        #fab-btn { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; background-color: var(--primary); color: white; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 5px 12px rgba(99, 102, 241, 0.4); z-index: 1000; }
        #jump-box { position: fixed; bottom: 100px; right: 25px; background: var(--card-bg); padding: 15px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); display: none; z-index: 1000; }
        .star-btn { background: none; border: none; font-size: 26px; cursor: pointer; margin-left: auto; }
    </style>
</head>
<body>

<div class="navbar" id="navbar">
    <button class="nav-btn" onclick="resetQuiz()">🗑️ Reset</button>
    <button class="nav-btn" onclick="toggleDarkMode()">🌙 Mode</button>
    <button class="nav-btn" onclick="showBookmarks()">⭐ Fav</button>
</div>

<div class="container">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="quiz-card" class="quiz-card"></div>
</div>

<button id="fab-btn" onclick="toggleInput()">Q#</button>
<div id="jump-box">
    <input type="number" id="q-number" placeholder="Enter Q No." onkeypress="handleEnter(event)">
</div>

<script>
    let score = 0, currentQ = 0, currentItems = [], startTime = Date.now();
    const files = ["data.json", "quiz.json", "quiz2.json"];

    async function init() {
        const navbar = document.getElementById('navbar');
        files.forEach(file => {
            let btn = document.createElement('button');
            btn.className = 'nav-btn'; btn.innerText = file;
            btn.onclick = () => loadQuiz(file, btn);
            navbar.appendChild(btn);
        });
        loadQuiz(files[0], document.querySelector('.nav-btn'));
    }

    async function loadQuiz(file, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let res = await fetch(file);
        let data = await res.json();
        currentItems = data.quiz || data;
        currentQ = parseInt(localStorage.getItem(file + '_q')) || 0;
        startTime = Date.now(); 
        render();
    }

    function render() {
        if(currentQ >= currentItems.length) return showSummary();
        let qData = currentItems[currentQ];
        let qText = qData.q || qData.question;
        document.getElementById('progress-fill').style.width = ((currentQ + 1) / currentItems.length) * 100 + "%";
        
        const quizCard = document.getElementById('quiz-card');
        quizCard.innerHTML = `
            <div style="display:flex; align-items:center;">
                <h3>Q${currentQ + 1}: ${qText}</h3>
                <button class="star-btn" onclick="toggleBookmark('${qText.replace(/'/g, "\\'")}')">⭐</button>
            </div>
        `;
        
        (qData.o || qData.options).forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'btn'; 
            btn.innerText = opt;
            btn.onclick = () => {
                document.querySelectorAll('.btn').forEach(b => b.disabled = true);
                if(opt === (qData.a || qData.answer)) {
                    btn.style.background = "#22c55e"; 
                    btn.style.color = "white";
                    score += 10;
                } else {
                    btn.style.background = "#ef4444"; 
                    btn.style.color = "white";
                }
                saveProgress();
            };
            quizCard.appendChild(btn);
        });

        quizCard.innerHTML += `
            <a class="google-btn" href="https://www.google.com/search?q=${encodeURIComponent(qText)}" target="_blank">🔍 Google वर शोधा</a>
            <div class="controls">
                <button class="nav-control" onclick="changeQ(-1)">⬅️ Prev</button>
                <button class="nav-control" onclick="changeQ(1)">Next ➡️</button>
            </div>
        `;
    }

    function showSummary() {
        let t = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('quiz-card').innerHTML = `<h2>सत्र पूर्ण! 🎉</h2><p>⏱️ समय: ${Math.floor(t/60)}m ${t%60}s</p><button class="btn" onclick="resetQuiz()">Restart</button>`;
    }

    function saveProgress() { localStorage.setItem('last_q', currentQ); }
    function changeQ(dir) { currentQ = Math.max(0, Math.min(currentItems.length - 1, currentQ + dir)); render(); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function resetQuiz() { localStorage.clear(); location.reload(); }
    function toggleInput() { document.getElementById('jump-box').style.display = document.getElementById('jump-box').style.display === 'block' ? 'none' : 'block'; }
    function handleEnter(e) { if (e.key === "Enter") { currentQ = parseInt(document.getElementById('q-number').value) - 1; render(); toggleInput(); } }
    function toggleBookmark(q) { alert("Bookmarked!"); }
    function showBookmarks() { alert("Check your saved items."); }

    init();
</script>
</body>
</html>
