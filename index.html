<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>History Revision Quiz</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .quiz-card { 
            background: white; padding: 25px; width: 100%; max-width: 450px; 
            border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            margin-bottom: 30px; text-align: center;
        }
        .stats { display: flex; justify-content: space-between; font-weight: bold; color: #555; margin-bottom: 15px; }
        .btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #e0e0e0; border-radius: 12px; background: white; 
            cursor: pointer; text-align: left; transition: 0.2s; 
        }
        .btn:hover { border-color: #007bff; background: #f8fbff; }
        .correct { background: #2ecc71 !important; color: white; border-color: #2ecc71; }
        .wrong { background: #e74c3c !important; color: white; border-color: #e74c3c; }
    </style>
</head>
<body>

<div id="quiz-container"></div>

<script>
    const files = ["data.json", "quiz.json", "quiz2.json"];

    async function loadQuizzes() {
        const container = document.getElementById('quiz-container');

        for (let file of files) {
            try {
                let res = await fetch(file);
                let data = await res.json();
                let items = data.quiz ? data.quiz : data; // Dono formats handle karega

                // Har file ke liye ek card
                let card = document.createElement('div');
                card.className = 'quiz-card';
                
                // Header (Points/Time)
                card.innerHTML = `<div class="stats"><span>Points: 0</span><span>Time: 0s</span></div>`;

                // Filhal file ka pehla sawal le rahe hain
                let qData = items[0];
                let questionText = qData.q || qData.question;
                let options = qData.o || qData.options;
                let answer = qData.a || qData.answer;

                card.innerHTML += `<h3>${questionText}</h3>`;
                
                options.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        if(opt === answer) btn.className = 'btn correct';
                        else btn.className = 'btn wrong';
                    };
                    card.appendChild(btn);
                });

                container.appendChild(card);
            } catch(e) { console.error("Error loading " + file); }
        }
    }

    loadQuizzes();
</script>
</body>
</html>
