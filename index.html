<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Quiz App with History</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }

        .navbar { background: white; padding: 15px; display: flex; gap: 10px; overflow-x: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: #e2e8f0; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: 600; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; }

        .container { max-width: 500px; margin: 20px auto; padding: 0 20px; }
        .points-box { background: #dbeafe; color: #1e40af; text-align: center; padding: 12px; border-radius: 15px; font-weight: bold; margin-bottom: 20px; }
        
        .quiz-card { background: var(--card-bg); padding: 30px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
        .question-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; }
        
        .btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 2px solid #f1f5f9; border-radius: 16px; background: #f8fafc; cursor: pointer; transition: 0.3s; }
        .btn:hover:not(:disabled) { border-color: var(--primary); background: #eef2ff; }
        
        .correct { background: #22c55e !important; color: white; border: none; }
        .wrong { background: #ef4444 !important; color: white; border: none; }

        .next-btn { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 16px; margin-top: 15px; font-weight: 600; cursor: pointer; }
        .google-btn { background: #ffffff; color: var(--primary); border: 2px solid var(--primary); padding: 14px; width: 100%; border-radius: 16px; margin-top: 10px; text-decoration: none; display: block; text-align: center; font-weight: 600; }

        /* FAB Styles */
        #fab-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background-color: var(--primary); color: white; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4); font-weight: bold; font-size: 1.2rem; z-index: 1000; }
        #jump-box { position: fixed; bottom: 90px; right: 20px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; z-index: 1000; border: 1px solid #e2e8f0; }
        #jump-box input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 120px; }
    </style>
</head>
<body>

<div class="navbar" id="navbar"></div>
<div class="container">
    <div class="points-box" id="points">Points: 0</div>
    <div id="quiz-card" class="quiz-card"></div>
</div>

<button id="fab-btn" onclick="toggleInput()">Q#</button>
<div id="jump-box">
    <input type="number" id="q-number" placeholder="Enter Q No." onkeypress="handleEnter(event)">
</div>

<script>
    const files = ["data.json", "quiz.json", "quiz2.json"];
    let score = 0, currentQ = 0, currentItems = [];

    async function init() {
        const navbar = document.getElementById('navbar');
        for (let file of files) {
            let btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = file;
            btn.onclick = () => loadQuiz(file, btn);
            navbar.appendChild(btn);
        }
        loadQuiz(files[0], document.querySelector('.nav-btn'));
    }

    async function loadQuiz(fileName, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let res = await fetch(fileName);
        let data = await res.json();
        currentItems = data.quiz || data;
        
        // Load Saved History
        currentQ = parseInt(localStorage.getItem(fileName + '_q')) || 0;
        score = parseInt(localStorage.getItem(fileName + '_score')) || 0;
        document.getElementById('points').innerText = "Points: " + score;
        render();
    }

    function saveProgress(fileName) {
        localStorage.setItem(fileName + '_q', currentQ);
        localStorage.setItem(fileName + '_score', score);
    }

    function render() {
        let qData = currentItems[currentQ];
        const quizCard = document.getElementById('quiz-card');
        quizCard.innerHTML = `<div class="question-text">${currentQ + 1}. ${qData.q || qData.question}</div>`;
        
        (qData.o || qData.options).forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => {
                quizCard.querySelectorAll('.btn').forEach(b => b.disabled = true);
                if(opt === (qData.a || qData.answer)) {
                    btn.classList.add('correct');
                    score += 10;
                } else {
                    btn.classList.add('wrong');
                    let gLink = document.createElement('a');
                    gLink.className = 'google-btn';
                    gLink.href = `https://www.google.com/search?q=${encodeURIComponent(qData.q || qData.question)}`;
                    gLink.target = "_blank";
                    gLink.innerText = "🔍 Google वर शोधा";
                    quizCard.appendChild(gLink);
                }
                document.getElementById('points').innerText = "Points: " + score;
                let activeFile = document.querySelector('.nav-btn.active').innerText;
                saveProgress(activeFile);
                
                let next = document.createElement('button');
                next.className = 'next-btn';
                next.innerText = "Next Question ➡️";
                next.onclick = () => { currentQ++; if(currentQ < currentItems.length) { saveProgress(activeFile); render(); } else quizCard.innerHTML = "सत्र पूर्ण! 🎉"; };
                quizCard.appendChild(next);
            };
            quizCard.appendChild(btn);
        });
    }

    function toggleInput() {
        const box = document.getElementById("jump-box");
        box.style.display = (box.style.display === "block") ? "none" : "block";
    }

    function handleEnter(event) {
        if (event.key === "Enter") {
            let qNum = parseInt(document.getElementById("q-number").value);
            if (qNum > 0 && qNum <= currentItems.length) {
                currentQ = qNum - 1;
                render();
                toggleInput();
            } else {
                alert("Sahi question number dalein!");
            }
        }
    }

    init();
</script>
</body>
</html>
