<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz App</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; }
        .dark-mode { --primary: #818cf8; --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; transition: 0.3s; }
        
        .navbar { background: var(--card-bg); padding: 20px; display: flex; gap: 15px; overflow-x: auto; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e2e8f0; }
        .nav-btn { background: #e2e8f0; border: none; padding: 12px 24px; border-radius: 25px; cursor: pointer; font-weight: 700; white-space: nowrap; font-size: 1rem; }
        .nav-btn.active { background: var(--primary); color: white; }
        
        .container { max-width: 700px; margin: 40px auto; padding: 0 30px; }
        #progress-bar { height: 12px; background: #e2e8f0; border-radius: 6px; margin-bottom: 30px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        
        .quiz-card { background: var(--card-bg); padding: 50px; border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 22px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 18px; background: transparent; color: var(--text); cursor: pointer; font-size: 1.1rem; font-weight: 600; transition: 0.2s; }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .controls { display: flex; gap: 15px; margin-top: 30px; }
        .nav-control { flex: 1; padding: 18px; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; background: #e2e8f0; font-size: 1.1rem; }
        .google-btn { display: block; width: 100%; padding: 18px; margin-top: 20px; text-align: center; text-decoration: none; border: 2px solid var(--primary); color: var(--primary); border-radius: 18px; font-weight: bold; font-size: 1.1rem; }
        
        #fab-btn { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background-color: var(--primary); color: white; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 6px 15px rgba(99, 102, 241, 0.5); z-index: 1000; font-size: 20px; }
        #jump-box { position: fixed; bottom: 110px; right: 30px; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); display: none; z-index: 1000; }
        .star-btn { background: none; border: none; font-size: 30px; cursor: pointer; margin-left: auto; }
    </style>
</head>
<body>

<div class="navbar" id="navbar">
    <button class="nav-btn" onclick="resetQuiz()">🗑️ Reset</button>
    <button class="nav-btn" onclick="toggleDarkMode()">🌙 Mode</button>
    <button class="nav-btn" onclick="showBookmarks()">⭐ Fav</button>
</div>

<div class="container">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="quiz-card" class="quiz-card"></div>
</div>

<button id="fab-btn" onclick="toggleInput()">Q#</button>
<div id="jump-box">
    <input type="number" id="q-number" placeholder="Enter Q No." style="padding:10px; border-radius:10px; border:1px solid #ccc;" onkeypress="handleEnter(event)">
</div>

<script>
    let score = 0, currentQ = 0, currentItems = [], startTime;
    const files = ["data.json", "quiz.json", "quiz2.json"];

    async function init() {
        const navbar = document.getElementById('navbar');
        files.forEach(file => {
            let btn = document.createElement('button');
            btn.className = 'nav-btn'; btn.innerText = file;
            btn.onclick = () => loadQuiz(file, btn);
            navbar.appendChild(btn);
        });
        startTime = Date.now();
        loadQuiz(files[0], document.querySelector('.nav-btn'));
    }

    async function loadQuiz(file, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let res = await fetch(file);
        let data = await res.json();
        currentItems = data.quiz || data;
        currentQ = parseInt(localStorage.getItem(file + '_q')) || 0;
        render();
    }

    function render() {
        if(currentQ >= currentItems.length) return showSummary();
        let qData = currentItems[currentQ];
        let qText = qData.q || qData.question;
        document.getElementById('progress-fill').style.width = ((currentQ + 1) / currentItems.length) * 100 + "%";
        
        const quizCard = document.getElementById('quiz-card');
        quizCard.innerHTML = `
            <div style="display:flex; align-items:center;">
                <h3>Q${currentQ + 1}: ${qText}</h3>
                <button class="star-btn" onclick="toggleBookmark('${qText.replace(/'/g, "\\'")}')">⭐</button>
            </div>
        `;
        
        (qData.o || qData.options).forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'btn'; 
            btn.innerText = opt;
            btn.onclick = () => {
                document.querySelectorAll('.btn').forEach(b => b.disabled = true);
                if(opt === (qData.a || qData.answer)) {
                    btn.style.background = "#22c55e"; 
                    btn.style.color = "white";
                    score += 10;
                } else {
                    btn.style.background = "#ef4444"; 
                    btn.style.color = "white";
                }
                saveProgress();
            };
            quizCard.appendChild(btn);
        });

        quizCard.innerHTML += `
            <a class="google-btn" href="https://www.google.com/search?q=${encodeURIComponent(qText)}" target="_blank">🔍 Google वर शोधा</a>
            <div class="controls">
                <button class="nav-control" onclick="changeQ(-1)">⬅️ Prev</button>
                <button class="nav-control" onclick="changeQ(1)">Next ➡️</button>
            </div>
        `;
    }

    function showSummary() {
        let timeTaken = Math.floor((Date.now() - startTime) / 1000);
        let m = Math.floor(timeTaken / 60);
        let s = timeTaken % 60;
        document.getElementById('quiz-card').innerHTML = `
            <h2>सत्र पूर्ण! 🎉</h2>
            <p style="font-size:1.2rem;">आपका स्कोर: ${score}</p>
            <p style="font-size:1.2rem;">⏱️ कुल समय: ${m} min ${s} sec</p>
            <button class="btn" onclick="resetQuiz()">Re-start</button>
        `;
    }

    function toggleBookmark(qText) {
        let b = JSON.parse(localStorage.getItem('bookmarks')) || [];
        b.includes(qText) ? b = b.filter(i => i !== qText) : b.push(qText);
        localStorage.setItem('bookmarks', JSON.stringify(b));
        alert("Saved to Favorites!");
    }

    function showBookmarks() {
        let b = JSON.parse(localStorage.getItem('bookmarks')) || [];
        alert("Favorites:\n" + (b.length ? b.join("\n") : "No favorites yet!"));
    }

    function changeQ(dir) {
        currentQ = Math.max(0, Math.min(currentItems.length - 1, currentQ + dir));
        saveProgress(); render();
    }

    function saveProgress() {
        let activeFile = document.querySelector('.nav-btn.active').innerText;
        localStorage.setItem(activeFile + '_q', currentQ);
        localStorage.setItem(activeFile + '_score', score);
    }

    function resetQuiz() { localStorage.clear(); location.reload(); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function toggleInput() { document.getElementById('jump-box').style.display = document.getElementById('jump-box').style.display === 'block' ? 'none' : 'block'; }
    function handleEnter(event) { if (event.key === "Enter") { let qNum = parseInt(document.getElementById('q-number').value); if(qNum > 0 && qNum <= currentItems.length) { currentQ = qNum - 1; render(); toggleInput(); } } }

    init();
</script>
</body>
</html>
