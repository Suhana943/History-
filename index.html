<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Quiz</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 10px; }
        .quiz-section { width: 100%; max-width: 450px; margin: 0 auto 30px auto; }
        .quiz-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; background: white; cursor: pointer; text-align: left; }
        .correct { background: #2ecc71 !important; color: white; border: none; }
        .wrong { background: #e74c3c !important; color: white; border: none; }
        .next-btn { background: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="main-container"></div>

<script>
    const files = ["data.json", "quiz.json", "quiz2.json"];

    async function loadAllQuizzes() {
        const container = document.getElementById('main-container');

        for (let file of files) {
            let res = await fetch(file);
            let rawData = await res.json();
            
            // SMART DETECTION: Agar 'quiz' property hai toh use lo, nahi toh pura data lo
            let items = rawData.quiz ? rawData.quiz : rawData;

            let section = document.createElement('div');
            section.className = 'quiz-section';
            section.innerHTML = `<h3>📂 ${file}</h3>`;
            
            let card = document.createElement('div');
            card.className = 'quiz-card';
            
            let qIndex = 0;
            function render() {
                let qData = items[qIndex];
                let q = qData.q || qData.question;
                let o = qData.o || qData.options;
                let a = qData.a || qData.answer;

                card.innerHTML = `<p><strong>${qIndex + 1}/${items.length}: ${q}</strong></p>`;
                
                o.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        card.querySelectorAll('.btn').forEach(b => b.disabled = true);
                        if(opt === a) btn.classList.add('correct');
                        else btn.classList.add('wrong');
                        
                        let next = document.createElement('button');
                        next.className = 'next-btn';
                        next.innerText = "Next Sawal ➡️";
                        next.onclick = () => { qIndex++; if(qIndex < items.length) render(); else card.innerHTML = "<p>Section khatam! 🎉</p>"; };
                        card.appendChild(next);
                    };
                    card.appendChild(btn);
                });
            }
            render();
            section.appendChild(card);
            container.appendChild(section);
        }
    }
    loadAllQuizzes();
</script>
</body>
</html>
