<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz App</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b; }
        .dark-mode { --primary: #818cf8; --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        
        .navbar { background: var(--card-bg); padding: 15px; display: flex; gap: 10px; overflow-x: auto; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e2e8f0; }
        .nav-btn { background: #e2e8f0; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .nav-btn.active { background: var(--primary); color: white; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 0 20px; }
        #progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        
        .quiz-card { background: var(--card-bg); padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; background: transparent; color: var(--text); cursor: pointer; transition: 0.2s; }
        .btn:hover { border-color: var(--primary); }
        
        /* FAB Styles */
        #fab-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background-color: var(--primary); color: white; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.4); z-index: 1000; }
        #jump-box { position: fixed; bottom: 90px; right: 20px; background: var(--card-bg); padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: none; z-index: 1000; }
    </style>
</head>
<body>

<div class="navbar" id="navbar">
    <button class="nav-btn" onclick="resetQuiz()">🗑️ Reset</button>
    <button class="nav-btn" onclick="toggleDarkMode()">🌙 Dark</button>
</div>

<div class="container">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="quiz-card" class="quiz-card"></div>
</div>

<button id="fab-btn" onclick="toggleInput()">Q#</button>
<div id="jump-box">
    <input type="number" id="q-number" placeholder="Enter Q No." onkeypress="handleEnter(event)">
</div>

<script>
    let score = 0, currentQ = 0, currentItems = [], correctCount = 0;
    const files = ["data.json", "quiz.json", "quiz2.json"];

    async function init() {
        const navbar = document.getElementById('navbar');
        files.forEach(file => {
            let btn = document.createElement('button');
            btn.className = 'nav-btn'; btn.innerText = file;
            btn.onclick = () => loadQuiz(file, btn);
            navbar.appendChild(btn);
        });
        loadQuiz(files[0], document.querySelector('.nav-btn:nth-child(3)'));
    }

    async function loadQuiz(file, btn) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let res = await fetch(file);
        let data = await res.json();
        currentItems = data.quiz || data;
        
        currentQ = parseInt(localStorage.getItem(file + '_q')) || 0;
        score = parseInt(localStorage.getItem(file + '_score')) || 0;
        render();
    }

    function render() {
        if(currentQ >= currentItems.length) return showSummary();
        
        let qData = currentItems[currentQ];
        document.getElementById('progress-fill').style.width = ((currentQ + 1) / currentItems.length) * 100 + "%";
        
        const quizCard = document.getElementById('quiz-card');
        quizCard.innerHTML = `<h3>Q${currentQ + 1}: ${qData.q || qData.question}</h3>`;
        
        (qData.o || qData.options).forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'btn'; btn.innerText = opt;
            btn.onclick = () => {
                if(opt === (qData.a || qData.answer)) { score += 10; correctCount++; }
                currentQ++;
                saveProgress();
                render();
            };
            quizCard.appendChild(btn);
        });
    }

    function saveProgress() {
        let activeFile = document.querySelector('.nav-btn.active').innerText;
        localStorage.setItem(activeFile + '_q', currentQ);
        localStorage.setItem(activeFile + '_score', score);
    }

    function showSummary() {
        document.getElementById('quiz-card').innerHTML = `<h2>सत्र पूर्ण! 🎉</h2><p>Score: ${score}</p><button class="btn" onclick="resetQuiz()">Re-start</button>`;
    }

    function resetQuiz() { localStorage.clear(); location.reload(); }
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    function toggleInput() { document.getElementById('jump-box').style.display = document.getElementById('jump-box').style.display === 'block' ? 'none' : 'block'; }

    function handleEnter(event) {
        if (event.key === "Enter") {
            let qNum = parseInt(document.getElementById('q-number').value);
            if(qNum > 0 && qNum <= currentItems.length) { currentQ = qNum - 1; render(); toggleInput(); }
        }
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === "ArrowRight") { currentQ++; render(); }
        if(e.key === "ArrowLeft" && currentQ > 0) { currentQ--; render(); }
    });

    init();
</script>
</body>
</html>
