<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Quiz</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .quiz-section { width: 100%; max-width: 450px; margin-bottom: 30px; }
        .quiz-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; background: white; cursor: pointer; text-align: left; }
        .correct { background: #2ecc71 !important; color: white; border: none; }
        .wrong { background: #e74c3c !important; color: white; border: none; }
        .google-link { display: block; margin-top: 15px; color: #1a73e8; text-decoration: none; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="main-container" style="width: 100%; max-width: 450px;"></div>

<script>
    const files = ["data.json", "quiz.json", "quiz2.json"];

    async function loadAllQuizzes() {
        const container = document.getElementById('main-container');

        for (let file of files) {
            let res = await fetch(file);
            let data = await res.json();
            let items = data.quiz ? data.quiz : data;

            let section = document.createElement('div');
            section.className = 'quiz-section';
            section.innerHTML = `<h3>📂 ${file}</h3>`;
            
            let card = document.createElement('div');
            card.className = 'quiz-card';
            
            let qIndex = 0;
            function render() {
                let qData = items[qIndex];
                let q = qData.q || qData.question;
                let o = qData.o || qData.options;
                let a = qData.a || qData.answer;
                
                // Google Link logic: JSON se link lo, ya phir question ko search query bana do
                let searchLink = qData.link || `https://www.google.com/search?q=${encodeURIComponent(q)}`;

                card.innerHTML = `<p><strong>${qIndex + 1}/${items.length}: ${q}</strong></p>`;
                
                o.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        card.querySelectorAll('.btn').forEach(b => b.disabled = true);
                        if(opt === a) {
                            btn.classList.add('correct');
                        } else {
                            btn.classList.add('wrong');
                            // Galat hone par Google Link dikhayenge
                            let linkEl = document.createElement('a');
                            linkEl.href = searchLink;
                            linkEl.target = "_blank";
                            linkEl.className = "google-link";
                            linkEl.innerText = "🔍 Google par iska jawab samjhein";
                            card.appendChild(linkEl);
                        }
                        // Next button add karna
                        let next = document.createElement('button');
                        next.className = 'btn';
                        next.style.backgroundColor = "#007bff";
                        next.style.color = "white";
                        next.innerText = "Next Sawal ➡️";
                        next.onclick = () => { qIndex++; if(qIndex < items.length) render(); else card.innerHTML = "<p>Section khatam! 🎉</p>"; };
                        card.appendChild(next);
                    };
                    card.appendChild(btn);
                });
            }
            render();
            section.appendChild(card);
            container.appendChild(section);
        }
    }

    loadAllQuizzes();
</script>
</body>
</html>
