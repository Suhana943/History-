</head>

    let currentIdx = 0;

    function showAbout() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('about-page').style.display = 'block';
    }

    function showQuiz() {
        document.getElementById('quiz-container').style.display = 'block';
        document.getElementById('about-page').style.display = 'none';
    }

    function loadQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question').innerText = "Q" + (currentIdx + 1) + ": " + q.question;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt);
            optDiv.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected) {
        const q = quizData[currentIdx];
        const buttons = document.querySelectorAll('.btn');
        buttons.forEach(b => {
            if (b.innerText === q.answer) b.classList.add('correct');
            else if (b.innerText === selected) b.classList.add('wrong');
            b.disabled = true;
        });
    }

    function nextQuestion() {
        if(currentIdx < quizData.length - 1) { currentIdx++; loadQuestion(); }
    }

    function prevQuestion() {
        if(currentIdx > 0) { currentIdx--; loadQuestion(); }
    }

    function googleSearch() {
        const query = quizData[currentIdx].question;
        window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
    }

    loadQuestion();
</script>
