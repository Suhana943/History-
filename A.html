    const quizArea = document.getElementById('quiz-area');

    data.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <p><strong>प्रश्न ${index + 1}:</strong> '${item.नाव}' या वृत्तपत्राचे संपादक कोण होते?</p>
            <input type="text" id="ans${index}" placeholder="उत्तर लिहा...">
            <button onclick="checkAnswer(${index}, '${item.संपादक}')">तपासा</button>
            <p id="res${index}"></p>
        `;
        quizArea.appendChild(div);
    });

    function checkAnswer(id, correct) {
        const input = document.getElementById('ans' + id).value;
        const res = document.getElementById('res' + id);
        if (input.trim() === correct) {
            res.innerHTML = "✅ बरोबर!";
            res.style.color = "green";
        } else {
            res.innerHTML = "❌ चूक! योग्य उत्तर: " + correct;
            res.style.color = "red";
        }
    }
