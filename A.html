    let currentIndex = 0;

    function loadQuestion() {
        const q = questions[currentIndex];
        document.getElementById('question').innerText = `Q${currentIndex + 1}: ${q.question}`;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => alert(opt === q.answer ? "बरोबर! ✅" : "चुकीचे! ❌");
            optionsDiv.appendChild(btn);
        });
    }

    function nextQuestion() {
        if (currentIndex < questions.length - 1) { currentIndex++; loadQuestion(); }
    }

    function prevQuestion() {
        if (currentIndex > 0) { currentIndex--; loadQuestion(); }
    }

    loadQuestion();
